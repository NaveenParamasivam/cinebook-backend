# ============================================================
# CineBook - Application Configuration
# All sensitive values must be set via environment variables
# ============================================================

spring.application.name=cinebook-backend

# ---- Server ----
server.port=${SERVER_PORT}
server.servlet.context-path=/api

# ---- Database ----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}

# ---- Gmail SMTP ----
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# ---- App Mail ----
app.mail.from=${MAIL_USERNAME:noreply@cinebook.com}
app.mail.from-name=CineBook

# ---- Razorpay ----
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.currency=INR
razorpay.company.name=CineBook

# ---- CORS ----
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=${UPLOAD_DIR:uploads/posters}

# ---- Default Admin Account (created on first startup) ----
app.admin.email=${ADMIN_EMAIL:admin@cinebook.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.first-name=${ADMIN_FIRST_NAME:Super}
app.admin.last-name=${ADMIN_LAST_NAME:Admin}

# ---- Secret key required to register additional admin accounts ----
app.admin.registration-secret=${ADMIN_REGISTRATION_SECRET:change-this-secret-key}

# ---- Logging ----
logging.level.com.cinebook=INFO
logging.level.org.springframework.security=WARN
