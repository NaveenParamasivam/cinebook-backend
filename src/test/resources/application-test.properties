spring.application.name=cinebook-backend-test

server.servlet.context-path=/api

# In-memory DB for tests
spring.datasource.url=jdbc:h2:mem:cinebook_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Entities have MySQL-ish names like `cast` (reserved in H2). Auto-quote keywords in tests while
# keeping production schema unchanged.
spring.jpa.properties.hibernate.auto_quote_keyword=true

# Provide defaults so beans that @Value these can initialize
app.jwt.secret=test-secret-key-please-change
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=7200000

app.admin.registration-secret=test-admin-secret

razorpay.key.id=rzp_test_key
razorpay.key.secret=rzp_test_secret
razorpay.currency=INR

# Avoid email sending failures during tests (services should be mocked anyway)
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
